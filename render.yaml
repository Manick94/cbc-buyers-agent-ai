services:
  - type: web
    name: buyers-agent-backend
    env: node
    region: singapore
    plan: starter
    buildCommand: cd backend && npm install && npm run build && npm run db:init && npm run seed
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_PATH
        value: ./data/buyers_agent.db
      - key: CORS_ORIGIN
        value: https://buyers-agent-frontend.onrender.com

  - type: web
    name: buyers-agent-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://buyers-agent-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
